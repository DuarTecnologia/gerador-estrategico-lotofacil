<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Gerador Estratégico Lotofácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-6">
            <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
            <h1 class="text-2xl font-bold mt-2">Finalizar Compra</h1>
            <p class="text-gray-500">Plano Vitalício - R$ 24,90</p>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Nome completo</label>
            <input type="text" id="nome" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">E-mail</label>
            <input type="email" id="email" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Telefone</label>
            <input type="tel" id="telefone" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Como nos conheceu?</label>
            <select id="origem" class="w-full p-3 border rounded-xl">
                <option value="Google">Google</option>
                <option value="Instagram">Instagram</option>
                <option value="TikTok">TikTok</option>
                <option value="Facebook">Facebook</option>
                <option value="Indicação">Indicação</option>
            </select>
        </div>
        
        <button id="btnPix" class="w-full bg-green-500 text-white p-3 rounded-xl font-bold mb-3 hover:bg-green-600">
            💳 Pagar com PIX (R$ 24,90)
        </button>
        <button id="btnCartao" class="w-full bg-blue-500 text-white p-3 rounded-xl font-bold hover:bg-blue-600">
            💳 Pagar com Cartão (R$ 24,90)
        </button>
        
        <div id="msg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        // ⚠️ CONFIGURAÇÕES
        // ⚠️ ATENÇÃO: Este token tem permissão APENAS para this repository
        const GITHUB_TOKEN = 'github_pat_SEU_TOKEN_AQUI';  // Substitua pelo seu token
        const REPO_OWNER = 'DuarTecnologia';
        const REPO_NAME = 'gerador-estrategico-lotofacil';
        const FILE_PATH = 'pedidos.json';
        
        const LINK_CARTAO = 'https://link.infinitepay.io/edipo_/VC1DLUMtSQ-e3g5keb4Z-24,90';
        const CHAVE_PIX = 'cff1a61d-2273-4e77-bc7c-1ca9cf351885';
        
        async function salvarPedidoGitHub(pedido) {
            try {
                // 1. Buscar arquivo atual
                const getUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                const getResponse = await fetch(getUrl, {
                    headers: { 
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!getResponse.ok) {
                    throw new Error(`HTTP ${getResponse.status}`);
                }
                
                const fileData = await getResponse.json();
                const content = atob(fileData.content);
                const pedidos = JSON.parse(content);
                
                // 2. Adicionar novo pedido
                pedidos.push(pedido);
                
                // 3. Salvar de volta
                const putResponse = await fetch(getUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Novo pedido: ${pedido.nome}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(pedidos, null, 2)))),
                        sha: fileData.sha
                    })
                });
                
                if (!putResponse.ok) {
                    throw new Error(`HTTP ${putResponse.status}`);
                }
                
                return true;
            } catch(error) {
                console.error('❌ Erro detalhado:', error);
                return false;
            }
        }
        
        async function salvarPedido() {
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const origem = document.getElementById('origem').value;
            
            if (!nome || !email) {
                alert('Preencha nome e e-mail');
                return false;
            }
            
            const pedido = {
                id: Date.now(),
                nome: nome,
                email: email,
                telefone: telefone,
                origem: origem,
                plano: 'Plano Vitalício',
                valor: 24.90,
                data: new Date().toISOString(),
                status: 'pendente'
            };
            
            const salvou = await salvarPedidoGitHub(pedido);
            
            if (salvou) {
                console.log('✅ Pedido salvo no GitHub:', pedido);
                return true;
            } else {
                alert('Erro ao registrar pedido. Tente novamente.');
                return false;
            }
        }
        
        document.getElementById('btnPix').addEventListener('click', async () => {
            if (await salvarPedido()) {
                navigator.clipboard.writeText(CHAVE_PIX);
                alert(`✅ Pedido registrado!\n\nChave PIX: ${CHAVE_PIX}\n\nApós pagar, aguarde a confirmação.`);
                document.getElementById('nome').value = '';
                document.getElementById('email').value = '';
                document.getElementById('telefone').value = '';
            }
        });
        
        document.getElementById('btnCartao').addEventListener('click', async () => {
            if (await salvarPedido()) {
                window.open(LINK_CARTAO, '_blank');
                alert('✅ Pedido registrado! Link do cartão aberto em nova aba.');
                document.getElementById('nome').value = '';
                document.getElementById('email').value = '';
                document.getElementById('telefone').value = '';
            }
        });
    </script>
</body>
</html>
