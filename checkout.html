<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Gerador Estratégico Lotofácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .loading.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid white; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p class="mt-4">Gerando link de pagamento...</p>
    </div>

    <div class="w-full max-w-4xl mx-auto p-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-3">
                <i class="fas fa-chart-line text-3xl text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Finalizar Compra</h1>
            <p class="text-indigo-200">Preencha os dados abaixo para gerar pagamento</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="grid md:grid-cols-2">
                <div class="p-6 md:p-8">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">Dados para acesso</h2>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Nome completo *</label>
                        <input type="text" id="nome" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">E-mail *</label>
                        <input type="email" id="email" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none">
                        <p class="text-xs text-gray-500 mt-1">As credenciais serão enviadas para este e-mail após pagamento</p>
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Telefone (WhatsApp)</label>
                        <input type="tel" id="telefone" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none" placeholder="(11) 99999-9999">
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2">Como nos conheceu?</label>
                        <select id="origem" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none">
                            <option value="">Selecione...</option>
                            <option value="google">Google</option>
                            <option value="instagram">Instagram</option>
                            <option value="facebook">Facebook</option>
                            <option value="indicacao">Indicação</option>
                        </select>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 md:p-8 border-l border-gray-200">
                    <h2 class="text-xl font-bold text-gray-800 mb-6">Resumo do Pedido</h2>
                    
                    <div id="resumoPlano" class="mb-6 p-4 bg-gradient-to-r from-indigo-50 to-violet-50 rounded-xl">
                        <!-- Plano será carregado via JS -->
                    </div>
                    
                    <div class="border-t border-gray-200 pt-4 mt-4">
                        <div class="flex justify-between font-bold text-lg">
                            <span>Total</span>
                            <span id="totalPreco" class="text-indigo-600">R$ 0</span>
                        </div>
                    </div>
                    
                    <button id="btnFinalizar" class="w-full mt-6 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-3 rounded-xl hover:shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fas fa-credit-card"></i> Gerar Pagamento
                    </button>
                    
                    <p class="text-center text-xs text-gray-500 mt-4">
                        <i class="fas fa-shield-alt"></i> Pagamento processado pela InfinitePay
                    </p>
                    <p class="text-center text-xs text-gray-400 mt-2">
                        Aceita PIX, Cartão de Crédito e Débito
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DA INFINITEPAY
        // SUA INFINITETAG (handle) - está no print como $edipo_
        const INFINITE_HANDLE = 'edipo_';  // Use sem o símbolo $ [citation:1]
        
        // SEU BEARER TOKEN (solicite ao suporte da InfinitePay)
        // Enquanto não tiver, deixe null e use o método alternativo
        const INFINITE_TOKEN = null;  // Ex: 'Bearer seu_token_aqui'
        
        // Dados do plano pela URL
        const urlParams = new URLSearchParams(window.location.search);
        const plano = urlParams.get('plano');
        const preco = parseInt(urlParams.get('preco'));
        const nomePlano = urlParams.get('nome');
        
        if (nomePlano && preco) {
            document.getElementById('resumoPlano').innerHTML = `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800">${decodeURIComponent(nomePlano)}</p>
                        <p class="text-sm text-gray-500">Acesso ${plano === 'mensal' ? '30 dias' : 'vitalício'}</p>
                    </div>
                    <div class="text-xl font-bold text-indigo-600">R$ ${preco}</div>
                </div>
            `;
            document.getElementById('totalPreco').innerHTML = `R$ ${preco}`;
        } else {
            window.location.href = 'index.html';
        }
        
        // Função para gerar link de pagamento via InfinitePay
        async function gerarLinkPagamento(dados) {
            const loading = document.getElementById('loading');
            loading.classList.add('active');
            
            // Dados para enviar à InfinitePay [citation:1]
            const payload = {
                handle: INFINITE_HANDLE,
                redirect_url: window.location.origin + '/obrigado.html',
                webhook_url: window.location.origin + '/webhook.html',
                order_nsu: Date.now().toString(),
                customer: {
                    name: dados.nome,
                    email: dados.email,
                    phone_number: dados.telefone
                },
                items: [
                    {
                        quantity: 1,
                        price: preco * 100,  // Em centavos: R$ 97 = 9700 [citation:1]
                        description: decodeURIComponent(nomePlano) + ' - Gerador Estratégico Lotofácil'
                    }
                ]
            };
            
            console.log('Enviando para InfinitePay:', payload);
            
            // Método 1: Via API oficial (requer token)
            if (INFINITE_TOKEN) {
                try {
                    const response = await fetch('https://api.infinitepay.io/invoices/public/checkout/links', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + INFINITE_TOKEN
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        loading.classList.remove('active');
                        // Redirecionar para página de pagamento
                        window.location.href = result.url;
                        return;
                    }
                } catch (error) {
                    console.error('Erro na API:', error);
                }
            }
            
            // Método 2: Via URL simplificada (fallback) [citation:3]
            // Formato: https://checkout.infinitepay.io/handle?items=[{"name":"Produto","price":100,"quantity":1}]&redirect_url=URL
            const itemsJson = JSON.stringify([{
                name: decodeURIComponent(nomePlano),
                price: preco * 100,
                quantity: 1
            }]);
            
            const redirectUrl = window.location.origin + '/obrigado.html';
            const checkoutUrl = `https://checkout.infinitepay.io/${INFINITE_HANDLE}?items=${encodeURIComponent(itemsJson)}&redirect_url=${encodeURIComponent(redirectUrl)}`;
            
            // Salvar dados da compra para processamento posterior
            const compra = {
                nome: dados.nome,
                email: dados.email,
                telefone: dados.telefone,
                plano: plano,
                preco: preco,
                nomePlano: decodeURIComponent(nomePlano),
                data: new Date().toISOString()
            };
            localStorage.setItem('pendente_' + Date.now(), JSON.stringify(compra));
            
            loading.classList.remove('active');
            
            // Abrir checkout em nova aba
            window.open(checkoutUrl, '_blank');
            
            // Mostrar instruções
            alert('✅ Link de pagamento gerado!\n\nUma nova aba foi aberta para finalizar o pagamento.\n\nApós a confirmação, você receberá o acesso por email em até 24h.');
            
            // Salvar para você processar manualmente
            console.log('📋 Dados para criação manual no Clerk:');
            console.log(`Nome: ${dados.nome}`);
            console.log(`Email: ${dados.email}`);
            console.log(`Plano: ${decodeURIComponent(nomePlano)}`);
            
            return checkoutUrl;
        }
        
        document.getElementById('btnFinalizar').addEventListener('click', async () => {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const origem = document.getElementById('origem').value;
            
            if (!nome || !email) {
                alert('Preencha nome e e-mail');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                alert('E-mail inválido');
                return;
            }
            
            const dados = { nome, email, telefone, origem };
            await gerarLinkPagamento(dados);
        });
    </script>
</body>
</html>
