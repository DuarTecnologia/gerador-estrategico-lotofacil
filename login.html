<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Gerador Estratégico Lotofácil</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Clerk SDK -->
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key=pk_test_cmVhZHktd2FzcC0wLmNsZXJrLmFjY291bnRzLmRldiQ
        src="https://your-domain.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4">
                <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Gerador Estratégico</h1>
            <p class="text-indigo-200 mt-1">Lotofácil 2.0</p>
        </div>

        <!-- Clerk vai montar o login aqui -->
        <div id="clerk-login" class="bg-white rounded-2xl shadow-xl p-6 sm:p-8"></div>

        <p class="text-center text-indigo-200 text-xs mt-8">
            Sistema educacional - não garantimos resultados em loterias.
        </p>
    </div>

    <script>
        window.addEventListener("load", async function () {
            // Carregar Clerk
            await Clerk.load();
            
            // Verificar se já está logado
            if (Clerk.user) {
                window.location.href = 'dashboard.html';
            } else {
                // Mostrar tela de login do Clerk
                Clerk.mountSignIn(document.getElementById("clerk-login"), {
                    appearance: {
                        elements: {
                            formButtonPrimary: "bg-indigo-600 hover:bg-indigo-700 w-full",
                            card: "shadow-none",
                            headerTitle: "text-2xl font-bold text-gray-800",
                            headerSubtitle: "text-gray-500"
                        }
                    },
                    redirectUrl: window.location.origin + '/dashboard.html'
                });
            }
        });
        
        // Se o usuário fizer login, redirecionar
        window.addEventListener("clerk:userLoaded", () => {
            if (Clerk.user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
