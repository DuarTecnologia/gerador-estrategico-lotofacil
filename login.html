<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Gerador Estratégico Lotofácil</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4">
                                <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Gerador Estratégico</h1>
            <p class="text-indigo-200 mt-1">Lotofácil 2.0</p>
        </div>

        <!-- Card de Login/Registro -->
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
            <!-- Abas -->
            <div class="flex gap-2 mb-6 border-b">
                <button id="tabLogin" class="flex-1 py-3 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600 transition">
                    Entrar
                </button>
                <button id="tabRegistro" class="flex-1 py-3 text-center font-semibold text-gray-500 hover:text-gray-700 transition">
                    Criar Conta
                </button>
            </div>

            <!-- Formulário de Login -->
            <div id="formLogin">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition" placeholder="seu@email.com">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                    <input type="password" id="loginSenha" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition" placeholder="********">
                </div>
                <button id="btnLogin" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold py-3 rounded-xl hover:shadow-lg transition transform hover:scale-[1.02]">
                    <i class="fas fa-sign-in-alt mr-2"></i> Entrar
                </button>
            </div>

            <!-- Formulário de Registro -->
            <div id="formRegistro" class="hidden">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                    <input type="email" id="regEmail" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition" placeholder="seu@email.com">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                    <input type="password" id="regSenha" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition" placeholder="mínimo 6 caracteres">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Confirmar Senha</label>
                    <input type="password" id="regConfirmar" class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition" placeholder="********">
                </div>
                <button id="btnRegistrar" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white font-bold py-3 rounded-xl hover:shadow-lg transition transform hover:scale-[1.02]">
                    <i class="fas fa-user-plus mr-2"></i> Criar Conta
                </button>
            </div>

            <!-- Mensagem de feedback -->
            <div id="mensagem" class="mt-4 text-center text-sm hidden"></div>
        </div>

        <p class="text-center text-indigo-200 text-xs mt-8">
            Sistema educacional - não garantimos resultados em loterias.<br>
            Ao acessar, você concorda com os termos de uso.
        </p>
    </div>

    <script>
        // 🔐 CONFIGURAÇÃO DO SUPABASE (SUBSTITUA SE NECESSÁRIO)
        const SUPABASE_URL = 'https://zribuvfplkdxlemzkmma.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyaWJ1dmZwbGtkeGxlbXprbW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzU3NjYsImV4cCI6MjA5MjYxMTc2Nn0.SQSe9WuXVjWkwGLqjZZOUgEtk1xIuVsKkr06q_JfDnY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Verificar se já está logado
        async function verificarSessao() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        
        // Tabs
        const tabLogin = document.getElementById('tabLogin');
        const tabRegistro = document.getElementById('tabRegistro');
        const formLogin = document.getElementById('formLogin');
        const formRegistro = document.getElementById('formRegistro');
        
        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('text-indigo-600', 'border-indigo-600');
            tabLogin.classList.remove('text-gray-500');
            tabRegistro.classList.remove('text-indigo-600', 'border-indigo-600');
            tabRegistro.classList.add('text-gray-500');
            formLogin.classList.remove('hidden');
            formRegistro.classList.add('hidden');
        });
        
        tabRegistro.addEventListener('click', () => {
            tabRegistro.classList.add('text-indigo-600', 'border-indigo-600');
            tabRegistro.classList.remove('text-gray-500');
            tabLogin.classList.remove('text-indigo-600', 'border-indigo-600');
            tabLogin.classList.add('text-gray-500');
            formRegistro.classList.remove('hidden');
            formLogin.classList.add('hidden');
        });
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.textContent = texto;
            msg.className = `mt-4 text-center text-sm p-3 rounded-lg ${tipo === 'erro' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'} block`;
            setTimeout(() => {
                msg.classList.add('hidden');
            }, 5000);
        }
        
        // LOGIN
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            
            if (!email || !senha) {
                mostrarMensagem('Preencha todos os campos', 'erro');
                return;
            }
            
            mostrarMensagem('Aguarde...', 'sucesso');
            
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: senha
            });
            
            if (error) {
                let msg = error.message;
                if (msg.includes('Invalid login credentials')) {
                    msg = 'E-mail ou senha inválidos';
                }
                mostrarMensagem('Erro: ' + msg, 'erro');
            } else {
                mostrarMensagem('Login realizado! Redirecionando...', 'sucesso');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        });
        
        // REGISTRO
        document.getElementById('btnRegistrar').addEventListener('click', async () => {
            const email = document.getElementById('regEmail').value;
            const senha = document.getElementById('regSenha').value;
            const confirmar = document.getElementById('regConfirmar').value;
            
            if (!email || !senha) {
                mostrarMensagem('Preencha todos os campos', 'erro');
                return;
            }
            
            if (senha.length < 6) {
                mostrarMensagem('Senha deve ter no mínimo 6 caracteres', 'erro');
                return;
            }
            
            if (senha !== confirmar) {
                mostrarMensagem('Senhas não coincidem', 'erro');
                return;
            }
            
            mostrarMensagem('Criando conta...', 'sucesso');
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: senha
            });
            
            if (error) {
                let msg = error.message;
                if (msg.includes('User already registered')) {
                    msg = 'Este e-mail já está cadastrado';
                }
                mostrarMensagem('Erro: ' + msg, 'erro');
            } else {
                mostrarMensagem('Conta criada! Faça login para continuar.', 'sucesso');
                // Mudar para aba de login
                tabLogin.click();
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginSenha').value = '';
            }
        });
        
        // Executar verificação ao carregar
        verificarSessao();
    </script>
</body>
</html>
