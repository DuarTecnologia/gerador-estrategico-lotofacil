<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerador Estratégico Lotofácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-600 to-purple-700 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
            <h1 class="text-2xl font-bold mt-2">Gerador Estratégico</h1>
            <p class="text-gray-500">Lotofácil 2.0</p>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">E-mail</label>
            <input type="email" id="email" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Senha</label>
            <input type="password" id="senha" class="w-full p-3 border rounded-xl">
        </div>
        <button id="btnLogin" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold hover:bg-indigo-700 transition">
            <i class="fas fa-sign-in-alt mr-2"></i> Entrar
        </button>
        
        <div class="mt-6 text-center border-t pt-6">
            <p class="text-gray-500 text-sm">Ainda não tem acesso?</p>
            <a href="index.html" class="text-indigo-600 font-semibold text-sm hover:underline">Adquirir plano →</a>
        </div>
        
        <div id="erro" class="mt-4 text-red-500 text-sm text-center hidden"></div>
    </div>

    <script>
        const WORKER_URL = 'https://api-pedidos.edipo-8aa.workers.dev';
        
        // Verificar se já está logado
        const usuarioLogado = localStorage.getItem('usuario_logado');
        if (usuarioLogado) {
            window.location.href = 'gerador.html';
        }
        
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value.trim();
            const erroDiv = document.getElementById('erro');
            
            if (!email || !senha) {
                erroDiv.innerText = 'Preencha e-mail e senha';
                erroDiv.classList.remove('hidden');
                setTimeout(() => erroDiv.classList.add('hidden'), 3000);
                return;
            }
            
            try {
                const response = await fetch(`${WORKER_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('usuario_logado', JSON.stringify(data.user));
                    window.location.href = 'gerador.html';
                } else {
                    erroDiv.innerText = data.error || 'E-mail ou senha inválidos';
                    erroDiv.classList.remove('hidden');
                    setTimeout(() => erroDiv.classList.add('hidden'), 3000);
                }
            } catch (error) {
                erroDiv.innerText = 'Erro de conexão. Tente novamente.';
                erroDiv.classList.remove('hidden');
                setTimeout(() => erroDiv.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
