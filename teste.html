<!DOCTYPE html>
<html>
<head>
    <title>Teste localStorage</title>
</head>
<body>
    <h1>Teste de salvamento</h1>
    <button onclick="salvar()">Salvar Pedido Teste</button>
    <button onclick="ver()">Ver Pedidos</button>
    <button onclick="limpar()">Limpar</button>
    <div id="resultado"></div>

    <script>
        function salvar() {
            const pedido = {
                id: Date.now(),
                nome: 'Cliente Teste',
                email: 'teste@teste.com',
                data: new Date().toISOString()
            };
            
            let pedidos = localStorage.getItem('pedidos_pendentes');
            pedidos = pedidos ? JSON.parse(pedidos) : [];
            pedidos.push(pedido);
            localStorage.setItem('pedidos_pendentes', JSON.stringify(pedidos));
            
            document.getElementById('resultado').innerHTML = '✅ Pedido salvo! Total: ' + pedidos.length;
            console.log('Salvo:', pedidos);
        }
        
        function ver() {
            const pedidos = localStorage.getItem('pedidos_pendentes');
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(JSON.parse(pedidos || '[]'), null, 2) + '</pre>';
        }
        
        function limpar() {
            localStorage.removeItem('pedidos_pendentes');
            document.getElementById('resultado').innerHTML = '🗑️ Limpo!';
        }
    </script>
</body>
</html>
