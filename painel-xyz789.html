<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerador Estratégico Lotofácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .loading { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .loading.active { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid white; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 min-h-screen p-8">
    <div class="container mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-white">Painel Administrativo</h1>
            <a href="index.html" class="bg-gray-700 text-white px-4 py-2 rounded-lg hover:bg-gray-600">Voltar ao site</a>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="text-white mt-4">Carregando...</p>
        </div>

        <!-- Login -->
        <div id="login" class="max-w-md mx-auto bg-white rounded-xl p-8 shadow-lg">
            <h2 class="text-2xl font-bold mb-4 text-center">Acesso Restrito</h2>
            <p class="text-gray-500 text-center mb-6">Digite a senha de administrador</p>
            <input type="password" id="senha" placeholder="Senha" class="w-full p-3 border rounded-lg mb-4">
            <button onclick="logar()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold hover:bg-indigo-700">Entrar</button>
        </div>

        <!-- Painel Admin -->
        <div id="admin" class="hidden">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-xl p-6 text-center">
                    <i class="fas fa-shopping-cart text-3xl text-blue-500 mb-2"></i>
                    <p class="text-gray-500 text-sm">Pedidos Pendentes</p>
                    <p class="text-3xl font-bold" id="totalPendentes">0</p>
                </div>
                <div class="bg-white rounded-xl p-6 text-center">
                    <i class="fas fa-users text-3xl text-green-500 mb-2"></i>
                    <p class="text-gray-500 text-sm">Usuários Ativos</p>
                    <p class="text-3xl font-bold" id="totalUsuarios">0</p>
                </div>
                <div class="bg-white rounded-xl p-6 text-center">
                    <i class="fas fa-chart-line text-3xl text-purple-500 mb-2"></i>
                    <p class="text-gray-500 text-sm">Total de Vendas</p>
                    <p class="text-3xl font-bold" id="totalVendas">R$ 0</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 mb-6">
                <button onclick="mostrarTab('pedidos')" id="tabPedidosBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">📦 Pedidos</button>
                <button onclick="mostrarTab('usuarios')" id="tabUsuariosBtn" class="bg-gray-700 text-white px-6 py-2 rounded-lg">👥 Usuários</button>
                <button onclick="mostrarTab('criar')" id="tabCriarBtn" class="bg-gray-700 text-white px-6 py-2 rounded-lg">➕ Criar</button>
            </div>

            <div id="pedidosTab" class="bg-white rounded-xl p-6"></div>
            <div id="usuariosTab" class="bg-white rounded-xl p-6 hidden"></div>
            <div id="criarTab" class="bg-white rounded-xl p-6 hidden">
                <h3 class="text-xl font-bold mb-4">➕ Criar Usuário</h3>
                <p class="text-gray-500 text-sm mb-4">Senha será: <strong>primeiro nome + 123</strong></p>
                <input type="text" id="novoNome" placeholder="Nome completo" class="w-full p-3 border rounded-lg mb-3">
                <input type="email" id="novoEmail" placeholder="E-mail" class="w-full p-3 border rounded-lg mb-3">
                <button onclick="criarUsuario()" class="bg-green-600 text-white px-6 py-2 rounded-lg">Criar</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://api-pedidos.edipo-8aa.workers.dev';
        const SENHA_ADMIN = '1357';
        
        function mostrarLoading(mostrar) {
            const loading = document.getElementById('loading');
            if (mostrar) loading.classList.add('active');
            else loading.classList.remove('active');
        }
        
        function logar() {
            const senha = document.getElementById('senha').value;
            if (senha === SENHA_ADMIN) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('admin').classList.remove('hidden');
                carregarPedidos();
                carregarUsuarios();
            } else {
                alert('Senha incorreta!');
            }
        }
        
        async function carregarPedidos() {
            mostrarLoading(true);
            try {
                const response = await fetch(`${WORKER_URL}/pedidos`);
                const data = await response.json();
                const div = document.getElementById('pedidosTab');
                
                if (!data.success || data.pedidos.length === 0) {
                    div.innerHTML = '<div class="text-center text-green-600 py-8"><i class="fas fa-check-circle text-4xl mb-2"></i><p>✅ Nenhum pedido pendente</p></div>';
                    document.getElementById('totalPendentes').innerText = '0';
                    mostrarLoading(false);
                    return;
                }
                
                div.innerHTML = data.pedidos.map(p => `
                    <div class="border rounded-lg p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${p.nome}</p>
                            <p class="text-sm text-gray-600">${p.email}</p>
                            <p class="text-sm text-indigo-600">${p.plano} - R$ ${p.valor}</p>
                            <p class="text-xs text-gray-400">${new Date(p.data).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="aprovarPedido('${p.id}')" class="bg-green-500 text-white px-4 py-2 rounded-lg">✅ Aprovar</button>
                            <button onclick="recusarPedido('${p.id}')" class="bg-red-500 text-white px-4 py-2 rounded-lg">❌ Recusar</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('totalPendentes').innerText = data.pedidos.length;
            } catch(error) {
                div.innerHTML = '<p class="text-red-500 text-center py-8">❌ Erro ao carregar pedidos</p>';
            }
            mostrarLoading(false);
        }
        
        async function aprovarPedido(id) {
            if (!confirm('Aprovar este pedido?')) return;
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${WORKER_URL}/pedidos`);
                const data = await response.json();
                const pedido = data.pedidos.find(p => p.id === id);
                if (!pedido) throw new Error('Pedido não encontrado');
                
                const senha = pedido.nome.split(' ')[0].toLowerCase() + '123';
                const email = pedido.email.toLowerCase();
                
                const userResponse = await fetch(`${WORKER_URL}/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: pedido.nome, email, senha, plano: 'Vitalício' })
                });
                
                const userData = await userResponse.json();
                if (!userData.success) throw new Error(userData.error);
                
                await fetch(`${WORKER_URL}/pedidos/${id}`, { method: 'DELETE' });
                
                const credenciais = `E-mail: ${email}\nSenha: ${senha}\nLink: https://sistema-gerador-estrategico.edipo-8aa.workers.dev/index.html`;
                navigator.clipboard.writeText(credenciais);
                alert(`✅ Aprovado!\n\n${credenciais}`);
                
                await carregarPedidos();
                await carregarUsuarios();
            } catch(error) {
                alert('Erro: ' + error.message);
            }
            mostrarLoading(false);
        }
        
        async function recusarPedido(id) {
            if (!confirm('Recusar este pedido?')) return;
            mostrarLoading(true);
            try {
                await fetch(`${WORKER_URL}/pedidos/${id}`, { method: 'DELETE' });
                alert('✅ Pedido recusado!');
                await carregarPedidos();
            } catch(error) {
                alert('Erro ao recusar');
            }
            mostrarLoading(false);
        }
        
        async function carregarUsuarios() {
            mostrarLoading(true);
            try {
                const response = await fetch(`${WORKER_URL}/usuarios`);
                const data = await response.json();
                const div = document.getElementById('usuariosTab');
                
                if (!data.success || data.usuarios.length === 0) {
                    div.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-users text-4xl mb-2"></i><p>👥 Nenhum usuário cadastrado</p></div>';
                    document.getElementById('totalUsuarios').innerText = '0';
                    document.getElementById('totalVendas').innerHTML = 'R$ 0';
                    mostrarLoading(false);
                    return;
                }
                
                div.innerHTML = data.usuarios.map(u => `
                    <div class="border rounded-lg p-4 flex justify-between items-center">
                        <div>
                            <p class="font-bold">${u.nome}</p>
                            <p class="text-sm text-gray-600">${u.email}</p>
                            <p class="text-sm text-indigo-600">${u.plano}</p>
                            <p class="text-xs text-gray-400">Senha: ${u.senha}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copiarCredenciais('${u.email}', '${u.senha}', '${u.nome}')" class="bg-indigo-500 text-white px-4 py-2 rounded-lg">📋 Copiar</button>
                            <button onclick="excluirUsuario('${u.email}')" class="bg-red-500 text-white px-4 py-2 rounded-lg">🗑️ Excluir</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('totalUsuarios').innerText = data.usuarios.length;
                document.getElementById('totalVendas').innerHTML = `R$ ${(data.usuarios.length * 24.90).toFixed(2)}`;
            } catch(error) {
                div.innerHTML = '<p class="text-red-500 text-center py-8">❌ Erro ao carregar usuários</p>';
            }
            mostrarLoading(false);
        }
        
        async function excluirUsuario(email) {
            if (!confirm(`Excluir ${email}?`)) return;
            mostrarLoading(true);
            try {
                await fetch(`${WORKER_URL}/usuarios/${encodeURIComponent(email)}`, { method: 'DELETE' });
                alert('✅ Usuário excluído!');
                await carregarUsuarios();
            } catch(error) {
                alert('Erro ao excluir');
            }
            mostrarLoading(false);
        }
        
        async function criarUsuario() {
            const nome = document.getElementById('novoNome').value.trim();
            const email = document.getElementById('novoEmail').value.trim().toLowerCase();
            if (!nome || !email) { alert('Preencha nome e e-mail'); return; }
            
            const senha = nome.split(' ')[0].toLowerCase() + '123';
            mostrarLoading(true);
            
            try {
                const response = await fetch(`${WORKER_URL}/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, plano: 'Vitalício' })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`✅ Usuário criado!\n\nE-mail: ${email}\nSenha: ${senha}`);
                    document.getElementById('novoNome').value = '';
                    document.getElementById('novoEmail').value = '';
                    await carregarUsuarios();
                } else {
                    alert('Erro: ' + data.error);
                }
            } catch(error) {
                alert('Erro ao criar');
            }
            mostrarLoading(false);
        }
        
        function copiarCredenciais(email, senha, nome) {
            const texto = `Olá ${nome},\n\nE-mail: ${email}\nSenha: ${senha}\n\nLink: https://sistema-gerador-estrategico.edipo-8aa.workers.dev/index.html`;
            navigator.clipboard.writeText(texto);
            alert('✅ Credenciais copiadas!');
        }
        
        function mostrarTab(tab) {
            document.getElementById('pedidosTab').classList.add('hidden');
            document.getElementById('usuariosTab').classList.add('hidden');
            document.getElementById('criarTab').classList.add('hidden');
            
            document.getElementById('tabPedidosBtn').classList.add('bg-gray-700');
            document.getElementById('tabPedidosBtn').classList.remove('bg-indigo-600');
            document.getElementById('tabUsuariosBtn').classList.add('bg-gray-700');
            document.getElementById('tabUsuariosBtn').classList.remove('bg-indigo-600');
            document.getElementById('tabCriarBtn').classList.add('bg-gray-700');
            document.getElementById('tabCriarBtn').classList.remove('bg-indigo-600');
            
            if (tab === 'pedidos') {
                document.getElementById('pedidosTab').classList.remove('hidden');
                document.getElementById('tabPedidosBtn').classList.remove('bg-gray-700');
                document.getElementById('tabPedidosBtn').classList.add('bg-indigo-600');
                carregarPedidos();
            } else if (tab === 'usuarios') {
                document.getElementById('usuariosTab').classList.remove('hidden');
                document.getElementById('tabUsuariosBtn').classList.remove('bg-gray-700');
                document.getElementById('tabUsuariosBtn').classList.add('bg-indigo-600');
                carregarUsuarios();
            } else if (tab === 'criar') {
                document.getElementById('criarTab').classList.remove('hidden');
                document.getElementById('tabCriarBtn').classList.remove('bg-gray-700');
                document.getElementById('tabCriarBtn').classList.add('bg-indigo-600');
            }
        }
    </script>
</body>
</html>
