<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerador Estratégico Lotofácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen p-8">
    <div class="container mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-white">Painel Administrativo</h1>
            <a href="index.html" class="bg-gray-700 text-white px-4 py-2 rounded-lg">Voltar</a>
        </div>

        <div id="login" class="max-w-md mx-auto bg-white rounded-xl p-8">
            <h2 class="text-xl font-bold mb-4">Acesso Restrito</h2>
            <input type="password" id="senha" placeholder="Senha" class="w-full p-3 border rounded-lg mb-4">
            <button onclick="logar()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-bold">Entrar</button>
        </div>

        <div id="admin" class="hidden">
            <div class="flex gap-4 mb-6">
                <button onclick="mostrarTab('pedidos')" id="tabPedidos" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">📦 Pedidos</button>
                <button onclick="mostrarTab('usuarios')" id="tabUsuarios" class="bg-gray-700 text-white px-6 py-2 rounded-lg">👥 Usuários</button>
                <button onclick="mostrarTab('criar')" id="tabCriar" class="bg-gray-700 text-white px-6 py-2 rounded-lg">➕ Criar</button>
            </div>

            <div id="pedidosTab" class="bg-white rounded-xl p-6"></div>
            <div id="usuariosTab" class="bg-white rounded-xl p-6 hidden"></div>
            <div id="criarTab" class="bg-white rounded-xl p-6 hidden">
                <h3 class="text-xl font-bold mb-4">Criar Usuário</h3>
                <input type="text" id="nome" placeholder="Nome" class="w-full p-3 border rounded-lg mb-3">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded-lg mb-3">
                <button onclick="criarUsuario()" class="bg-green-600 text-white px-6 py-2 rounded-lg">Criar</button>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://api-pedidos.edipo-8aa.workers.dev';
        const SENHA_ADMIN = '1357';
        
        function logar() {
            const senha = document.getElementById('senha').value;
            if (senha === SENHA_ADMIN) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('admin').classList.remove('hidden');
                carregarPedidos();
                carregarUsuarios();
            } else {
                alert('Senha incorreta!');
            }
        }
        
        async function carregarPedidos() {
            const response = await fetch(`${WORKER_URL}/pedidos`);
            const data = await response.json();
            const div = document.getElementById('pedidosTab');
            
            if (!data.success || data.pedidos.length === 0) {
                div.innerHTML = '<p class="text-gray-500 text-center py-8">✅ Nenhum pedido pendente</p>';
                return;
            }
            
            div.innerHTML = data.pedidos.map(p => `
                <div class="border rounded-lg p-4 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${p.nome}</p>
                        <p class="text-sm text-gray-600">${p.email}</p>
                        <p class="text-sm">R$ ${p.valor} - ${p.formaPagamento || 'Pendente'}</p>
                    </div>
                    <button onclick="aprovarPedido('${p.id}')" class="bg-green-500 text-white px-4 py-2 rounded-lg">✅ Aprovar</button>
                </div>
            `).join('');
        }
        
        async function aprovarPedido(id) {
            const response = await fetch(`${WORKER_URL}/pedidos`);
            const data = await response.json();
            const pedido = data.pedidos.find(p => p.id === id);
            
            if (!pedido) return;
            
            const primeiroNome = pedido.nome.split(' ')[0].toLowerCase();
            const senha = primeiroNome + '123';
            
            const userResponse = await fetch(`${WORKER_URL}/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: pedido.nome,
                    email: pedido.email,
                    senha: senha,
                    plano: 'Vitalício'
                })
            });
            
            const userData = await userResponse.json();
            
            if (userData.success) {
                await fetch(`${WORKER_URL}/pedidos/${id}`, { method: 'DELETE' });
                
                alert(`✅ Usuário criado!\n\nE-mail: ${pedido.email}\nSenha: ${senha}\n\nCredenciais copiadas.`);
                navigator.clipboard.writeText(`🔐 Acesso Gerador Lotofácil\n\nE-mail: ${pedido.email}\nSenha: ${senha}\n\nLink: https://sistema-gerador-estrategico.edipo-8aa.workers.dev/sistema.html`);
                
                carregarPedidos();
                carregarUsuarios();
            } else {
                alert('Erro: ' + userData.error);
            }
        }
        
        async function carregarUsuarios() {
            const response = await fetch(`${WORKER_URL}/usuarios`);
            const data = await response.json();
            const div = document.getElementById('usuariosTab');
            
            if (!data.success || data.usuarios.length === 0) {
                div.innerHTML = '<p class="text-gray-500 text-center py-8">👥 Nenhum usuário cadastrado</p>';
                return;
            }
            
            div.innerHTML = data.usuarios.map(u => `
                <div class="border rounded-lg p-4 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${u.nome}</p>
                        <p class="text-sm text-gray-600">${u.email}</p>
                        <p class="text-sm">Senha: ${u.senha}</p>
                    </div>
                    <button onclick="copiarCredenciais('${u.email}', '${u.senha}', '${u.nome}')" class="bg-indigo-500 text-white px-4 py-2 rounded-lg">📋 Copiar</button>
                </div>
            `).join('');
        }
        
        async function criarUsuario() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const primeiroNome = nome.split(' ')[0].toLowerCase();
            const senha = primeiroNome + '123';
            
            const response = await fetch(`${WORKER_URL}/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, plano: 'Vitalício' })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert(`✅ Usuário criado!\n\nE-mail: ${email}\nSenha: ${senha}`);
                document.getElementById('nome').value = '';
                document.getElementById('email').value = '';
                carregarUsuarios();
            } else {
                alert('Erro: ' + data.error);
            }
        }
        
        function copiarCredenciais(email, senha, nome) {
            const texto = `🔐 Acesso Gerador Lotofácil\n\nOlá ${nome},\n\nE-mail: ${email}\nSenha: ${senha}\n\nLink: https://sistema-gerador-estrategico.edipo-8aa.workers.dev/sistema.html`;
            navigator.clipboard.writeText(texto);
            alert('Credenciais copiadas!');
        }
        
        function mostrarTab(tab) {
            document.getElementById('pedidosTab').classList.add('hidden');
            document.getElementById('usuariosTab').classList.add('hidden');
            document.getElementById('criarTab').classList.add('hidden');
            
            if (tab === 'pedidos') {
                document.getElementById('pedidosTab').classList.remove('hidden');
                carregarPedidos();
            } else if (tab === 'usuarios') {
                document.getElementById('usuariosTab').classList.remove('hidden');
                carregarUsuarios();
            } else if (tab === 'criar') {
                document.getElementById('criarTab').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
